<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤カレンダー</title>

<style>
body{
    font-family:sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

.info{
    text-align:center;
    font-size:20px;
    margin:15px 0;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.week{
    font-weight:bold;
    text-align:center;
    padding:10px;
}

.day{
    background:white;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
    user-select:none;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
    transition:.2s;
}

.day:hover{
    transform:scale(1.05);
}

.work{
    background:#4CAF50;
    color:white;
}

.rest{
    background:#f44336;
    color:white;
}

.empty{
    visibility:hidden;
}
</style>

</head>

<body>

<div class="container">

<h1>2026年7月</h1>

<div class="info">
出勤：<span id="workCount">0</span>日　
休み：<span id="restCount">0</span>日
</div>

<div class="calendar" id="calendar">

<div class="week">日</div>
<div class="week">月</div>
<div class="week">火</div>
<div class="week">水</div>
<div class="week">木</div>
<div class="week">金</div>
<div class="week">土</div>

</div>

</div>

<script>

const calendar=document.getElementById("calendar");

const workCount=document.getElementById("workCount");

const restCount=document.getElementById("restCount");

let work=0;
let rest=0;

// 2026年7月は水曜日開始
for(let i=0;i<3;i++){
    const e=document.createElement("div");
    e.className="empty";
    calendar.appendChild(e);
}

for(let i=1;i<=31;i++){

    const d=document.createElement("div");

    d.className="day";

    d.textContent=i;

    d.dataset.state="0";

    d.onclick=function(){

        if(d.dataset.state=="0"){

            d.dataset.state="1";

            d.className="day work";

            work++;

        }else if(d.dataset.state=="1"){

            d.dataset.state="2";

            d.className="day rest";

            work--;

            rest++;

        }else{

            d.dataset.state="0";

            d.className="day";

            rest--;

        }

        workCount.textContent=work;

        restCount.textContent=rest;

    };

    calendar.appendChild(d);

}

</script>

</body>
</html>
