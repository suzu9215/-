<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出勤管理</title>

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#333;
color:white;
}

select{
padding:8px;
border-radius:8px;
}

.info{
text-align:center;
font-size:18px;
margin:15px;
}

.period{
text-align:center;
font-weight:bold;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.week{
text-align:center;
font-weight:bold;
}

.day{
height:65px;
background:white;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,.15);
font-size:14px;
}

.work{
background:#4CAF50;
color:white;
}

.rest{
background:#f44336;
color:white;
}

.overtime{
background:#ff9800;
color:white;
}

.empty{
visibility:hidden;
}

.overMenu{
display:none;
text-align:center;
margin:15px;
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<button onclick="changePeriod(-1)">◀</button>

<h2 id="title"></h2>

<button onclick="changePeriod(1)">▶</button>

</div>



<div style="text-align:center">

締め日

<select id="closing" onchange="changeClosing()">

<option value="5">5日締め</option>
<option value="10">10日締め</option>
<option value="15" selected>15日締め</option>
<option value="20">20日締め</option>
<option value="25">25日締め</option>
<option value="31">月末締め</option>

</select>

</div>



<div class="period" id="period"></div>



<div class="info">

🟢出勤
<span id="workCount">0</span>日　

🔴休み
<span id="restCount">0</span>日　

🟡残業
<span id="overCount">0</span>時間

</div>



<div class="overMenu" id="overMenu">

残業時間を選択

<br>

<button onclick="setOver(1)">1h</button>
<button onclick="setOver(2)">2h</button>
<button onclick="setOver(3)">3h</button>
<button onclick="setOver(4)">4h</button>
<button onclick="setOver(5)">5h</button>

</div>



<div class="calendar" id="calendar">

<div class="week">日</div>
<div class="week">月</div>
<div class="week">火</div>
<div class="week">水</div>
<div class="week">木</div>
<div class="week">金</div>
<div class="week">土</div>

</div>


</div>
<script>

let targetDate = new Date();

let closingDay = 15;


// 保存データ
let records = JSON.parse(
    localStorage.getItem("workRecords")
) || {};


// 選択中の日付
let selectedKey = null;


const calendar =
document.getElementById("calendar");

const title =
document.getElementById("title");

const period =
document.getElementById("period");

const workCount =
document.getElementById("workCount");

const restCount =
document.getElementById("restCount");

const overCount =
document.getElementById("overCount");

const overMenu =
document.getElementById("overMenu");





// 締め日変更
function changeClosing(){

    closingDay =
    Number(document.getElementById("closing").value);

    draw();

}




// 期間移動
function changePeriod(num){

    targetDate.setMonth(
        targetDate.getMonth()+num
    );

    draw();

}





// 締め期間取得
function getRange(){


    let y =
    targetDate.getFullYear();

    let m =
    targetDate.getMonth();


    let start;
    let end;



    if(closingDay==31){


        start =
        new Date(y,m,1);


        end =
        new Date(y,m+1,0);



    }else{


        end =
        new Date(y,m,closingDay);


        start =
        new Date(y,m-1,closingDay+1);


    }



    return {
        start,
        end
    };

}





// カレンダー作成
function draw(){


    while(calendar.children.length>7){

        calendar.removeChild(
            calendar.lastChild
        );

    }



    let range=getRange();



    title.textContent =
    targetDate.getFullYear()
    +"年"
    +(targetDate.getMonth()+1)
    +"月分";



    period.textContent =
    "期間："
    +format(range.start)
    +"〜"
    +format(range.end);




    let first =
    range.start.getDay();



    for(let i=0;i<first;i++){

        let e=document.createElement("div");

        e.className="empty";

        calendar.appendChild(e);

    }





    let date =
    new Date(range.start);



    while(date<=range.end){



        let d=document.createElement("div");

        d.className="day";


        let key =
        makeKey(date);



        d.textContent =
        (date.getMonth()+1)
        +"月"
        +date.getDate()
        +"日";



        let data =
        records[key] || {
            state:"0",
            over:0
        };



        d.dataset.state =
        data.state;



        if(data.state=="1")
            d.className="day work";


        if(data.state=="2")
            d.className="day rest";


        if(data.state=="3")
            d.className="day overtime";




        d.onclick=function(){


            selectedKey=key;



            overMenu.style.display="block";



            if(data.state=="0"){


                data.state="1";


            }else if(data.state=="1"){


                data.state="2";


            }else if(data.state=="2"){


                data.state="3";


            }else{


                data.state="0";

                data.over=0;


            }




            records[key]=data;



            save();



            draw();


        };



        calendar.appendChild(d);



        date.setDate(
            date.getDate()+1
        );

    }



    count();


}





// 残業時間設定
function setOver(hour){


    if(selectedKey==null)
        return;



    if(!records[selectedKey]){

        records[selectedKey]={
            state:"3",
            over:0
        };

    }



    records[selectedKey].state="3";

    records[selectedKey].over=hour;



    save();



    overMenu.style.display="none";


    draw();


}





// 保存
function save(){

    localStorage.setItem(
        "workRecords",
        JSON.stringify(records)
    );

}





// 集計
function count(){


    let work=0;

    let rest=0;

    let over=0;


    let range=getRange();



    Object.keys(records).forEach(key=>{


        let d=new Date(key);



        if(d>=range.start && d<=range.end){


            if(records[key].state=="1")
                work++;


            if(records[key].state=="2")
                rest++;


            if(records[key].state=="3")
                over += Number(records[key].over);


        }


    });



    workCount.textContent=work;

    restCount.textContent=rest;

    overCount.textContent=over;


}




// 保存用日付
function makeKey(date){

return date.getFullYear()
+"-"
+(date.getMonth()+1)
+"-"
+date.getDate();

}



// 表示用
function format(date){

return date.getFullYear()
+"年"
+(date.getMonth()+1)
+"月"
+date.getDate()
+"日";

}



draw();


</script>


</body>

</html>
