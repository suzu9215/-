<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出勤管理</title>


<style>

body{
font-family:sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}


.container{
max-width:700px;
margin:auto;
}


.header{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}


button{
padding:8px 15px;
border:0;
border-radius:8px;
background:#333;
color:white;
}


h1{
font-size:22px;
}


.setting{
text-align:center;
margin:15px 0;
}


select{
padding:8px;
border-radius:8px;
}


.period{
text-align:center;
font-weight:bold;
margin:10px;
}


.info{
text-align:center;
font-size:16px;
margin:15px;
}


.calendar{

display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;

}


.week{

text-align:center;
font-weight:bold;

}


.day{

background:white;
height:65px;

display:flex;
flex-direction:column; /* ★文字と残業時数を縦並びにするため変更 */
justify-content:center;
align-items:center;

border-radius:10px;

cursor:pointer;

box-shadow:0 2px 5px rgba(0,0,0,.15);

font-size:14px;

}


.work{

background:#4CAF50;
color:white;

}


.rest{

background:#f44336;
color:white;

}

/* ★追加: 残業1hと2h用の黄色デザイン（文字は黒の方が見やすいので指定） */
.overtime{

background:#FFEB3B;
color:#333;

}

/* ★追加: 1hや2hの文字を少し小さく表示するスタイル */
.hour-label {
font-size: 11px;
font-weight: bold;
margin-top: 2px;
}


.empty{

visibility:hidden;

}


</style>


</head>


<body>


<div class="container">



<div class="header">

<button onclick="changePeriod(-1)">◀</button>

<h1 id="title"></h1>

<button onclick="changePeriod(1)">▶</button>

</div>



<div class="setting">


締め日：

<select id="closing" onchange="changeClosing()">

<option value="5">5日締め</option>

<option value="10">10日締め</option>

<option value="15" selected>15日締め</option>

<option value="20">20日締め</option>

<option value="25">25日締め</option>

<option value="31">月末締め</option>

</select>


</div>



<div class="period" id="period"></div>



<div class="info">

🟢出勤 <span id="workCount">0</span>日　
🔴休み <span id="restCount">0</span>日　
<!-- ★追加: 残業日数の集計表示 -->
🟡残1h <span id="ot1Count">0</span>日　
🟡残2h <span id="ot2Count">0</span>日

</div>



<div class="calendar" id="calendar">


<div class="week">日</div>

<div class="week">月</div>

<div class="week">火</div>

<div class="week">水</div>

<div class="week">木</div>

<div class="week">金</div>

<div class="week">土</div>


</div>


</div>
<script>

let targetDate = new Date();

// 前回追加した localStorage の処理をベースにしています
let closingDay = Number(localStorage.getItem("closingDay")) || 15;


// 保存データ
let records = JSON.parse(
localStorage.getItem("workRecords")
) || {};



const calendar = document.getElementById("calendar");
const title = document.getElementById("title");
const period = document.getElementById("period");
const workCount = document.getElementById("workCount");
const restCount = document.getElementById("restCount");
// ★追加: 残業カウント用の要素
const ot1Count = document.getElementById("ot1Count");
const ot2Count = document.getElementById("ot2Count");
const closingSelect = document.getElementById("closing");

closingSelect.value = closingDay;




// 締め日変更
function changeClosing(){

closingDay =
Number(closingSelect.value);

localStorage.setItem("closingDay", closingDay);

draw();

}




// 給料期間移動
function changePeriod(num){

targetDate.setMonth(
targetDate.getMonth()+num
);

draw();

}




// 期間取得
function getRange(){


let year =
targetDate.getFullYear();

let month =
targetDate.getMonth();



let start;
let end;



if(closingDay == 31){


start =
new Date(year,month,1);


end =
new Date(year,month+1,0);



}else{


end =
new Date(
year,
month,
closingDay
);


start =
new Date(
year,
month-1,
closingDay+1
);


}



return {
start:start,
end:end
};

}


// ★追加: 状態に応じたクラス名とテキスト（1h, 2hなど）をセットする共通関数
function updateDayDisplay(element, state, dateText) {
element.dataset.state = state;

if(state == "1"){
element.className = "day work";
element.innerHTML = `<div>${dateText}</div>`;
} else if(state == "2"){
element.className = "day rest";
element.innerHTML = `<div>${dateText}</div>`;
} else if(state == "3"){
element.className = "day overtime";
element.innerHTML = `<div>${dateText}</div><div class="hour-label">1h</div>`;
} else if(state == "4"){
element.className = "day overtime";
element.innerHTML = `<div>${dateText}</div><div class="hour-label">2h</div>`;
} else {
element.className = "day";
element.innerHTML = `<div>${dateText}</div>`;
}
}




// カレンダー作成
function draw(){



while(calendar.children.length > 7){

calendar.removeChild(
calendar.lastChild
);

}



let range = getRange();



title.textContent =
targetDate.getFullYear()
+"年"
+(targetDate.getMonth()+1)
+"月分";



period.textContent =
"期間："
+format(range.start)
+" ～ "
+format(range.end);




let first =
range.start.getDay();



for(let i=0;i<first;i++){


let e=document.createElement("div");

e.className="empty";

calendar.appendChild(e);

}




let date =
new Date(range.start);



while(date <= range.end){



let d =
document.createElement("div");


let key =
makeKey(date);



let dateText =
(date.getMonth()+1)
+"月"
+date.getDate()
+"日";



let currentState = records[key] || "0";

// ★初期表示の更新（関数化してスッキリさせました）
updateDayDisplay(d, currentState, dateText);



d.onclick=function(){

let nextState = "0";

// ★ループ処理: 0(未) → 1(出勤) → 2(休み) → 3(残業1h) → 4(残業2h) → 0に戻る
if(d.dataset.state == "0"){
nextState = "1";
}else if(d.dataset.state == "1"){
nextState = "2";
}else if(d.dataset.state == "2"){
nextState = "3";
}else if(d.dataset.state == "3"){
nextState = "4";
}else{
nextState = "0";
}

// 表示の更新
updateDayDisplay(d, nextState, dateText);


records[key]=nextState;



localStorage.setItem(
"workRecords",
JSON.stringify(records)
);



count();



};



calendar.appendChild(d);



date.setDate(
date.getDate()+1
);


}



count();

}




// 集計
function count(){



let work=0;

let rest=0;

let ot1=0; // ★追加

let ot2=0; // ★追加


let range=getRange();



Object.keys(records).forEach(key=>{


let date =
new Date(key);



if(date>=range.start && date<=range.end){



if(records[key]=="1"){

work++;

}


if(records[key]=="2"){

rest++;

}

// ★追加: 残業1hのカウント
if(records[key]=="3"){

ot1++;

}

// ★追加: 残業2hのカウント
if(records[key]=="4"){

ot2++;

}


}


});



workCount.textContent=work;

restCount.textContent=rest;

ot1Count.textContent=ot1; // ★追加

ot2Count.textContent=ot2; // ★追加


}




// 保存用日付
function makeKey(date){

return date.getFullYear()
+"-"
+(date.getMonth()+1)
+"-"
+date.getDate();

}



// 表示用
function format(date){

return date.getFullYear()
+"年"
+(date.getMonth()+1)
+"月"
+date.getDate()
+"日";

}




draw();


</script>


</body>

</html>
localStorage.removeItem("workRecords");
