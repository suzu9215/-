<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出勤管理</title>


<style>

body{
    font-family:sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}


.container{
    max-width:700px;
    margin:auto;
}


.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}


button{
    padding:8px 15px;
    border:0;
    border-radius:8px;
    background:#333;
    color:white;
}


h1{
    font-size:22px;
}


.setting{
    text-align:center;
    margin:15px 0;
}


select{
    padding:8px;
    border-radius:8px;
}


.period{
    text-align:center;
    font-weight:bold;
    margin:10px;
}


.info{
    text-align:center;
    font-size:18px;
    margin:15px;
}


.calendar{

    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;

}


.week{

    text-align:center;
    font-weight:bold;

}


.day{

    background:white;
    height:65px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:10px;

    cursor:pointer;

    box-shadow:0 2px 5px rgba(0,0,0,.15);

    font-size:14px;

}


.work{

    background:#4CAF50;
    color:white;

}


.rest{

    background:#f44336;
    color:white;

}


.empty{

    visibility:hidden;

}


</style>


</head>


<body>


<div class="container">



<div class="header">

<button onclick="changePeriod(-1)">◀</button>

<h1 id="title"></h1>

<button onclick="changePeriod(1)">▶</button>

</div>



<div class="setting">


締め日：

<select id="closing" onchange="changeClosing()">

<option value="5">5日締め</option>

<option value="10">10日締め</option>

<option value="15" selected>15日締め</option>

<option value="20">20日締め</option>

<option value="25">25日締め</option>

<option value="31">月末締め</option>

</select>


</div>



<div class="period" id="period"></div>



<div class="info">

🟢出勤
<span id="workCount">0</span>日　

🔴休み
<span id="restCount">0</span>日


</div>



<div class="calendar" id="calendar">


<div class="week">日</div>

<div class="week">月</div>

<div class="week">火</div>

<div class="week">水</div>

<div class="week">木</div>

<div class="week">金</div>

<div class="week">土</div>


</div>


</div>
<script>

let targetDate = new Date();

let closingDay = 15;


// 保存データ
let records = JSON.parse(
    localStorage.getItem("workRecords")
) || {};



const calendar = document.getElementById("calendar");
const title = document.getElementById("title");
const period = document.getElementById("period");
const workCount = document.getElementById("workCount");
const restCount = document.getElementById("restCount");




// 締め日変更
function changeClosing(){

    closingDay =
    Number(document.getElementById("closing").value);

    draw();

}




// 給料期間移動
function changePeriod(num){

    targetDate.setMonth(
        targetDate.getMonth()+num
    );

    draw();

}




// 期間取得
function getRange(){


    let year =
    targetDate.getFullYear();

    let month =
    targetDate.getMonth();



    let start;
    let end;



    if(closingDay == 31){


        start =
        new Date(year,month,1);


        end =
        new Date(year,month+1,0);



    }else{


        end =
        new Date(
            year,
            month,
            closingDay
        );


        start =
        new Date(
            year,
            month-1,
            closingDay+1
        );


    }



    return {
        start:start,
        end:end
    };

}




// カレンダー作成
function draw(){



    while(calendar.children.length > 7){

        calendar.removeChild(
            calendar.lastChild
        );

    }



    let range = getRange();



    title.textContent =
    targetDate.getFullYear()
    +"年"
    +(targetDate.getMonth()+1)
    +"月分";



    period.textContent =
    "期間："
    +format(range.start)
    +" ～ "
    +format(range.end);




    let first =
    range.start.getDay();



    for(let i=0;i<first;i++){


        let e=document.createElement("div");

        e.className="empty";

        calendar.appendChild(e);

    }




    let date =
    new Date(range.start);



    while(date <= range.end){



        let d =
        document.createElement("div");


        d.className="day";



        let key =
        makeKey(date);



        d.textContent =
        (date.getMonth()+1)
        +"月"
        +date.getDate()
        +"日";



        d.dataset.state =
        records[key] || "0";




        if(d.dataset.state=="1"){

            d.className="day work";

        }


        if(d.dataset.state=="2"){

            d.className="day rest";

        }




        d.onclick=function(){



            if(d.dataset.state=="0"){


                d.dataset.state="1";

                d.className="day work";


            }else if(d.dataset.state=="1"){


                d.dataset.state="2";

                d.className="day rest";


            }else{


                d.dataset.state="0";

                d.className="day";


            }



            records[key]=d.dataset.state;



            localStorage.setItem(
                "workRecords",
                JSON.stringify(records)
            );



            count();



        };



        calendar.appendChild(d);



        date.setDate(
            date.getDate()+1
        );


    }



    count();

}




// 集計
function count(){



    let work=0;

    let rest=0;


    let range=getRange();



    Object.keys(records).forEach(key=>{


        let date =
        new Date(key);



        if(date>=range.start && date<=range.end){



            if(records[key]=="1"){

                work++;

            }


            if(records[key]=="2"){

                rest++;

            }


        }


    });



    workCount.textContent=work;

    restCount.textContent=rest;


}




// 保存用日付
function makeKey(date){

    return date.getFullYear()
    +"-"
    +(date.getMonth()+1)
    +"-"
    +date.getDate();

}



// 表示用
function format(date){

    return date.getFullYear()
    +"年"
    +(date.getMonth()+1)
    +"月"
    +date.getDate()
    +"日";

}




draw();


</script>


</body>

</html>
