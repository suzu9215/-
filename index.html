<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出勤管理カレンダー</title>


<style>

body{

font-family:sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;

}


.container{

max-width:700px;
margin:auto;

}


.control{

display:flex;
justify-content:center;
align-items:center;
gap:15px;

}


h1{

font-size:22px;

}


button{

padding:8px 15px;
border:none;
border-radius:8px;
background:#333;
color:white;

}


select{

padding:8px;
border-radius:8px;

}


.info{

text-align:center;
font-size:18px;
margin:15px;

}


.period{

text-align:center;
margin:10px;
font-weight:bold;

}


.calendar{

display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;

}


.week{

text-align:center;
font-weight:bold;

}


.day{

background:white;
height:60px;

display:flex;
justify-content:center;
align-items:center;

border-radius:10px;

cursor:pointer;

box-shadow:0 2px 5px rgba(0,0,0,.15);

font-size:14px;

}


.work{

background:#4CAF50;
color:white;

}


.rest{

background:#f44336;
color:white;

}


.empty{

visibility:hidden;

}


.date{

font-size:12px;

}


</style>

</head>



<body>


<div class="container">


<div class="control">

<button onclick="changeMonth(-1)">◀</button>

<h1 id="title"></h1>

<button onclick="changeMonth(1)">▶</button>

</div>



<div style="text-align:center">


締め日：

<select id="closing" onchange="changeClosing()">

<option value="5">5日締め</option>

<option value="10">10日締め</option>

<option value="15" selected>15日締め</option>

<option value="20">20日締め</option>

<option value="25">25日締め</option>

<option value="31">月末締め</option>


</select>


</div>



<div class="period" id="period"></div>



<div class="info">


🟢出勤：
<span id="workCount">0</span>日


　

🔴休み：
<span id="restCount">0</span>日


</div>




<div class="calendar" id="calendar">


<div class="week">日</div>

<div class="week">月</div>

<div class="week">火</div>

<div class="week">水</div>

<div class="week">木</div>

<div class="week">金</div>

<div class="week">土</div>


</div>


</div>
<script>

let currentDate = new Date();

let closingDay = 15;


// 保存データ読み込み
let records = JSON.parse(
    localStorage.getItem("workRecords")
) || {};


const calendar =
document.getElementById("calendar");

const title =
document.getElementById("title");

const period =
document.getElementById("period");

const workCount =
document.getElementById("workCount");

const restCount =
document.getElementById("restCount");



// 締め日変更
function changeClosing(){

    closingDay =
    Number(document.getElementById("closing").value);

    drawCalendar();

}



// 月移動
function changeMonth(num){

    currentDate.setMonth(
        currentDate.getMonth()+num
    );

    drawCalendar();

}



// カレンダー作成
function drawCalendar(){



    // 日付部分を削除
    while(calendar.children.length > 7){

        calendar.removeChild(
            calendar.lastChild
        );

    }



    let year =
    currentDate.getFullYear();

    let month =
    currentDate.getMonth();



    title.textContent =
    year+"年"+(month+1)+"月分";



    // 締め期間を作成

    let startDate;

    let endDate;



    if(closingDay == 31){


        startDate =
        new Date(year,month,1);


        endDate =
        new Date(year,month+1,0);


    }else{


        endDate =
        new Date(
            year,
            month,
            closingDay
        );


        startDate =
        new Date(
            year,
            month-1,
            closingDay+1
        );


    }



    period.textContent =
    "期間："+
    formatDate(startDate)
    +" ～ "
    +
    formatDate(endDate);





    // 曜日の空白

    let firstDay =
    startDate.getDay();


    for(let i=0;i<firstDay;i++){


        let e =
        document.createElement("div");


        e.className="empty";


        calendar.appendChild(e);

    }





    // 期間の日数

    let date =
    new Date(startDate);



    while(date <= endDate){



        let d =
        document.createElement("div");


        d.className="day";



        let key =
        getKey(date);



        d.innerHTML =
        date.getMonth()+1
        +"月<br>"
        +date.getDate()
        +"日";




        d.dataset.state =
        records[key] || "0";



        if(d.dataset.state==="1"){

            d.className="day work";

        }


        if(d.dataset.state==="2"){

            d.className="day rest";

        }




        d.onclick=function(){



            if(d.dataset.state==="0"){


                d.dataset.state="1";

                d.className="day work";


            }else if(d.dataset.state==="1"){


                d.dataset.state="2";

                d.className="day rest";


            }else{


                d.dataset.state="0";

                d.className="day";


            }



            records[key]=d.dataset.state;



            // 保存

            localStorage.setItem(
                "workRecords",
                JSON.stringify(records)
            );



            count();



        };




        calendar.appendChild(d);



        date.setDate(
            date.getDate()+1
        );


    }



    count();


}





// 日付を保存用文字列へ

function getKey(date){

return date.getFullYear()
+"-"
+(date.getMonth()+1)
+"-"
+date.getDate();

}





// 表示用日付

function formatDate(date){

return date.getFullYear()
+"年"
+(date.getMonth()+1)
+"月"
+date.getDate()
+"日";

}





// 締め期間内だけ集計

function count(){


    let work=0;

    let rest=0;



    Object.keys(records).forEach(key=>{


        let d =
        new Date(key);



        let year =
        currentDate.getFullYear();


        let month =
        currentDate.getMonth();



        let end;


        if(closingDay==31){

            end =
            new Date(year,month+1,0);

        }else{

            end =
            new Date(
                year,
                month,
                closingDay
            );

        }



        let start;


        if(closingDay==31){

            start =
            new Date(
                year,
                month,
                1
            );

        }else{

            start =
            new Date(
                year,
                month-1,
                closingDay+1
            );

        }





        if(d>=start && d<=end){



            if(records[key]=="1"){

                work++;

            }


            if(records[key]=="2"){

                rest++;

            }


        }



    });



    workCount.textContent=work;

    restCount.textContent=rest;


}




drawCalendar();


</script>


</body>

</html>
